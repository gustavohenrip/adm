name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle build
        working-directory: backend
        run: |
          chmod +x ./gradlew || true
          ./gradlew --no-daemon assemble -x test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm install --no-audit --no-fund --ignore-scripts
          npx ng build --configuration=production

  package:
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: exe
            artifact: odm-Windows
          - os: ubuntu-latest
            target: linux
            artifact: odm-Linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            odm-desktop/package-lock.json
      - name: Build installer
        shell: bash
        run: node Build/build-app.mjs ${{ matrix.target }} --ci
      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            odm-desktop/dist/*.exe
            odm-desktop/dist/*.AppImage
            odm-desktop/dist/*.blockmap
            odm-desktop/dist/latest*.yml
