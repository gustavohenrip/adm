name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        type: string

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: exe
          - os: ubuntu-latest
            target: linux
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            odm-desktop/package-lock.json
      - name: Build installer
        shell: bash
        run: node Build/build-app.mjs ${{ matrix.target }} --ci
      - name: Publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        shell: bash
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "ODM desktop release." --latest || true
          else
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "ODM desktop release." --latest
          fi
          find odm-desktop/dist -maxdepth 1 -type f \( -name '*.exe' -o -name '*.AppImage' -o -name '*.blockmap' -o -name 'latest*.yml' \) -print0 | xargs -0 gh release upload "$RELEASE_TAG" --clobber
          gh release edit "$RELEASE_TAG" --draft=false --latest
