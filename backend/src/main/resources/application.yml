server:
  address: 127.0.0.1
  port: 0
  shutdown: graceful

spring:
  application:
    name: odm-backend
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        show_sql: false
  datasource:
    url: jdbc:sqlite:${user.home}/.odm/odm.sqlite
    driver-class-name: org.sqlite.JDBC
  quartz:
    job-store-type: memory

odm:
  downloads:
    root: ${user.home}/Downloads/ODM
    default-segments: 16
    max-segments: 64
    buffer-bytes: 524288
    min-split-bytes: 65536
    dns-prefetch: true
    tcp-prewarm: true
    dynamic-chunk-size: true
    retry:
      max-attempts: 8
      initial-delay-ms: 400
      max-delay-ms: 30000
  torrent:
    enabled: true
    dht-enabled: true
    lsd-enabled: true
    upnp-enabled: true
    listen-port: 0
  security:
    token-header: X-Odm-Token
  categorizer:
    enabled: true
    folders:
      Compressed: [zip, rar, 7z, tar, gz, bz2, xz, tgz, tbz, tbz2, txz]
      Documents: [pdf, doc, docx, xls, xlsx, ppt, pptx, txt, rtf, odt, epub, csv, md]
      Music: [mp3, flac, wav, ogg, m4a, aac, wma, opus]
      Video: [mp4, mkv, avi, mov, webm, flv, wmv, m4v, mpg, mpeg]
      Programs: [exe, msi, pkg, dmg, deb, rpm, appimage, apk]

logging:
  level:
    root: INFO
    com.opendownloader.odm: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"
